name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - migration/web-interface-monorepo

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run backend tests
        working-directory: backend
        run: make test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check frontend formatting and linting
        run: npm run check

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm run test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run visual smoke checks
        run: npm run visual:smoke

  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install frontend dependencies
        run: npm ci

      - name: Run dependency audits
        run: npm run audit:security

      - name: Start Bloom API
        working-directory: backend
        run: |
          uv run uvicorn apps.bloom_api.main:app --host 127.0.0.1 --port 8000 > /tmp/bloom-api.log 2>&1 &
          echo "$!" > /tmp/bloom-api.pid
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8000/api/v1/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/bloom-api.log
          exit 1

      - name: Run dynamic security smoke
        run: npm run security:dynamic

      - name: Stop Bloom API
        if: always()
        run: |
          if [ -f /tmp/bloom-api.pid ]; then
            kill "$(cat /tmp/bloom-api.pid)" || true
          fi
